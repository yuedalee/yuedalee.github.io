<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><title>悦达视频自动工作流私有研发台</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,rgba(56,189,248,.22),transparent 32%),#0b1120;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.wrap{min-height:100vh;display:grid;place-items:center;padding:28px}.box{width:min(980px,100%);display:grid;grid-template-columns:1.15fr .85fr;gap:16px;padding:16px;background:linear-gradient(145deg,rgba(30,41,59,.92),rgba(15,23,42,.96));border:1px solid rgba(148,163,184,.24);box-shadow:0 24px 80px rgba(0,0,0,.35);border-radius:26px}.hero{padding:34px}.eyebrow{color:#fbbf24;font-weight:800;font-size:13px;letter-spacing:.16em;text-transform:uppercase}h1{font-size:42px;line-height:1.12;margin:14px 0 14px;letter-spacing:-.04em}p{color:#cbd5e1;line-height:1.75}.form{padding:30px;background:rgba(2,6,23,.28);border:1px solid rgba(148,163,184,.18);border-radius:22px}label{display:block;margin:14px 0 8px;color:#e5e7eb;font-size:13px}input{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(148,163,184,.32);background:#020617;color:#fff;font-size:15px}button{margin-top:16px;width:100%;border:0;border-radius:14px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#111827;font-weight:900;padding:14px;cursor:pointer}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px;background:rgba(127,29,29,.28);border:1px solid rgba(251,113,133,.3);color:#fecdd3;line-height:1.6;font-size:13px}.note{font-size:12px;color:#94a3b8;margin-top:14px}@media(max-width:900px){.box{grid-template-columns:1fr}h1{font-size:32px}}</style></head><body><main class="wrap"><section class="box"><div class="hero"><div class="eyebrow">Yueda Private R&D Console</div><h1>视频自动工作流<br>私有研发台</h1><p>这是临时入口壳。项目资料不会明
